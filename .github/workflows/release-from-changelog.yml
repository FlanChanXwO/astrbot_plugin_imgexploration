name: Release From Changelog

on:
  push:
    branches:
      - master
      - main
    paths:
      - CHANGELOG.md
      - changelog.md
      - data/plugins/**/CHANGELOG.md
      - data/plugins/**/changelog.md
  workflow_dispatch:
    inputs:
      changelog_path:
        description: "Optional single changelog path (e.g. data/plugins/foo/CHANGELOG.md)"
        required: false
        default: ""
      tag_prefix:
        description: "Optional tag prefix override. Empty = <plugin>-v"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-from-changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changelog_files: ${{ steps.collect.outputs.changelog_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changelog files
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.changelog_path }}" ]; then
            file="${{ inputs.changelog_path }}"
            if [ ! -f "$file" ]; then
              echo "Input changelog path does not exist: $file" >&2
              exit 1
            fi
            json="$(jq -cn --arg f "$file" '[$f]')"
            echo "changelog_files=$json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git --no-pager ls-files "data/plugins/*/CHANGELOG.md" "data/plugins/*/changelog.md")"
          else
            changed_files="$(git --no-pager diff --name-only "$before" "$after")"
          fi

          json="$(printf '%s\n' "$changed_files" \
            | grep -E '^data/plugins/[^/]+/(CHANGELOG\.md|changelog\.md)$' \
            | awk 'NF' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')"

          if [ -z "$json" ]; then
            json='[]'
          fi

          echo "changelog_files=$json" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.changelog_files != '[]' && needs.prepare.outputs.changelog_files != ''

    strategy:
      fail-fast: false
      matrix:
        changelog: ${{ fromJson(needs.prepare.outputs.changelog_files) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version and notes
        id: parse
        shell: bash
        run: |
          set -euo pipefail

          changelog_path="${{ matrix.changelog }}"
          if [ ! -f "$changelog_path" ]; then
            echo "Missing changelog: $changelog_path" >&2
            exit 1
          fi

          IFS='/' read -r p1 p2 plugin_name _ <<< "$changelog_path"
          if [ "$p1" != "data" ] || [ "$p2" != "plugins" ] || [ -z "$plugin_name" ]; then
            echo "Unsupported changelog path: $changelog_path" >&2
            exit 1
          fi

          first_heading="$(grep -m1 -E '^##[[:space:]]*\[?v?[0-9]+\.[0-9]+\.[0-9]+([-.+][^]]+)?\]?.*$' "$changelog_path" || true)"
          if [ -z "$first_heading" ]; then
            echo "No version heading like '## [1.2.3]' found." >&2
            exit 1
          fi

          version="$(printf '%s\n' "$first_heading" | sed -E 's/^##[[:space:]]*\[?v?([^]]+)\]?.*$/\1/')"

          notes="$(awk '
            BEGIN { capture=0 }
            /^##[[:space:]]*/ {
              if (capture == 1) { exit }
              capture=1
            }
            capture == 1 { print }
          ' "$changelog_path")"

          if [ -z "$notes" ]; then
            echo "Failed to extract release notes from $changelog_path" >&2
            exit 1
          fi

          if [ -n "${{ inputs.tag_prefix }}" ]; then
            tag="${{ inputs.tag_prefix }}${version}"
          else
            tag="${plugin_name}-v${version}"
          fi

          notes_file="release-notes-${plugin_name}.md"
          printf '%s\n' "$notes" > "$notes_file"

          echo "plugin=$plugin_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Check existing tag/release
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.parse.outputs.tag }}"
          skip="false"
          reason=""

          if gh api "repos/${{ github.repository }}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            skip="true"
            reason="tag '$tag' already exists"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            skip="true"
            if [ -z "$reason" ]; then
              reason="release '$tag' already exists"
            else
              reason="$reason; release '$tag' already exists"
            fi
          fi

          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Skip summary
        if: steps.dedupe.outputs.skip == 'true'
        shell: bash
        run: |
          echo "Skip creating release for ${{ steps.parse.outputs.plugin }}: ${{ steps.dedupe.outputs.reason }}"

      - name: Create release and tag
        if: steps.dedupe.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.parse.outputs.tag }}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file "${{ steps.parse.outputs.notes_file }}"

      - name: Release summary
        if: steps.dedupe.outputs.skip != 'true'
        shell: bash
        run: |
          echo "Created release ${{ steps.parse.outputs.tag }} from ${{ matrix.changelog }}"
